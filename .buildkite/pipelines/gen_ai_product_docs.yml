env:
  FTR_GEN_AI: '1'
  FTR_EIS_CCM: '1'
  STACK_DOCS_VERSION: 'latest'
steps:
  - label: '👨‍🔧 Pre-Build'
    command: .buildkite/scripts/lifecycle/pre_build.sh
    agents:
      image: family/kibana-ubuntu-2404
      imageProject: elastic-images-prod
      provider: gcp
      machineType: n2-standard-2

  - wait

  - label: '🧑‍🏭 Build Kibana Distribution'
    command: .buildkite/scripts/steps/build_kibana.sh
    agents:
      image: family/kibana-ubuntu-2404
      imageProject: elastic-images-prod
      provider: gcp
      machineType: n2-standard-8
    key: build
    if: "build.env('KIBANA_BUILD_ID') == null || build.env('KIBANA_BUILD_ID') == ''"

  - wait

  - label: AppEx AI-Infra Inference APIs FTR tests
    key: ai-infra-gen-ai-inference-api
    command: |
      SOURCE_CLUSTER_CONFIG_B64="$(vault_get ai-infra-ci-docs source-cluster-config)"
      SOURCE_CLUSTER_CONFIG_JSON="$(echo "$SOURCE_CLUSTER_CONFIG_B64" | base64 -d)"

      export KIBANA_SOURCE_CLUSTER_URL="$(echo "$SOURCE_CLUSTER_CONFIG_JSON" | jq -r '.sourceClusterUrl')"
      export KIBANA_SOURCE_CLUSTER_API_KEY="$(echo "$SOURCE_CLUSTER_CONFIG_JSON" | jq -r '.sourceClusterApiKey')"
      export KIBANA_SOURCE_CLUSTER_USERNAME="$(echo "$SOURCE_CLUSTER_CONFIG_JSON" | jq -r '.sourceClusterUsername')"
      export KIBANA_SOURCE_CLUSTER_PASSWORD="$(echo "$SOURCE_CLUSTER_CONFIG_JSON" | jq -r '.sourceClusterPassword')"
      export KIBANA_SOURCE_INDEX="$(echo "$SOURCE_CLUSTER_CONFIG_JSON" | jq -r '.sourceIndex')"

      .buildkite/scripts/steps/test/ftr_configs.sh

      echo "--- Upload GenAI product docs artifacts to GCS"
      .buildkite/scripts/steps/gen_ai/upload_kb_artifacts.sh
    env:
      FTR_CONFIG: 'x-pack/platform/test/functional_gen_ai/inference/eis.config.ts'
      FTR_CONFIG_GROUP_KEY: 'ftr-ai-infra-gen-ai-inference-api'
      FTR_GEN_AI: '1'
      FTR_EIS_CCM: '1'
    timeout_in_minutes: 180
    parallelism: 1
    agents:
      image: family/kibana-ubuntu-2404
      imageProject: elastic-images-prod
      provider: gcp
      machineType: n2-standard-4
      preemptible: true
    retry:
      automatic:
        - exit_status: '-1'
          limit: 1
        - exit_status: '*'
          limit: 1
